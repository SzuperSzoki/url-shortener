name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Repo kikérése
      uses: actions/checkout@v4

    - name: Node.js beállítása
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Függőségek telepítése
      run: npm ci

    - name: Tesztek futtatása
      run: npm test